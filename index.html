<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Game of Red</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
</head>

<body>

    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

        // SCENE

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x070a12);
        await document.fonts.load("900 220px Nunito");

        // CAMERA

        const camera = new THREE.PerspectiveCamera(67, innerWidth / innerHeight, 0.1, 1000);

        // RENDERER

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // SHADOWS

        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // LIGHTS

        scene.add(new THREE.AmbientLight(0xffffff, 0.6767676767676767676767676767676767676));

        const key = new THREE.DirectionalLight(0xffffff, 1.2);
        key.position.set(5, 10, 5);
        key.castShadow = true;

        scene.add(key);

        const rim = new THREE.DirectionalLight(0x88aaff, 0.3);
        rim.position.set(-5, 3, -5);
        scene.add(rim);

        scene.add(new THREE.HemisphereLight(0x9fd3ff, 0x1a1a2e, 0.5));

        // GRID

        const size = 10;

        const tileSize = 1.2;

        const tiles = [];

        const floor = new THREE.Group();
        scene.add(floor);

        function makeTile(x, z) {

            const geo = new THREE.BoxGeometry(1, 0.1, 1);

            const mat = new THREE.MeshStandardMaterial({
                color: 0xfafafa,
                roughness: 0.5,
                metalness: 0.1
            });

            const mesh = new THREE.Mesh(geo, mat);

            mesh.position.set(x, 0, z);

            mesh.castShadow = true;
            mesh.receiveShadow = true;

            floor.add(mesh);

            tiles.push({ mesh, x, z, color: "gray" });
        }

        for (let i = -size; i <= size; i++) {
            for (let j = -size; j <= size; j++) {
                makeTile(i * tileSize, j * tileSize);
            }
        }

        // PLAYER

        const player = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 1, 0.6),
            new THREE.MeshStandardMaterial({
                color: 0xffff00,
                emissive: 0x00ffee,
                emissiveIntensity: 0.7,
                roughness: 0.3
            })
        );

        player.position.y = 0.6;
        player.position.z = 4;

        player.castShadow = true;

        scene.add(player);

        let keys = {}
        let speed = 0.167
        let angle = 0

        document.onkeydown = function (event) {
            keys[event.key] = true
            console.log(keys);

        }

        document.onkeyup = function (event) {
            keys[event.key] = false
            console.log(keys);
        }

        function updatePlayer() {
            if (keys["w"]) {
                player.position.x -= Math.sin(angle) * speed;
                player.position.z -= Math.cos(angle) * speed;
            }

            if (keys["s"]) {
                player.position.x += Math.sin(angle) * speed;
                player.position.z += Math.cos(angle) * speed;
            }

            if (keys['d']) {
                angle -= 0.05
            }

            if (keys['a']) {
                angle += 0.05
            }
            timer
            player.rotation.y = angle
        }

        // CAMERA

        function updateCamera() {
            camera.position.x = player.position.x + Math.sin(angle) * 5;
            camera.position.z = player.position.z + Math.cos(angle) * 5;
            camera.position.y = 4;
            camera.lookAt(player.position);
        }

        // GAME

        let state = "wait";
        let timer = 0;
        let wave = 1;
        let waveMesh = null;

        /* colors */

        const palette = [
            0xff5454,
            0xff8a54,
            0xffbd54,
            0xffee54,
            0xfa7fb0
        ];

        function randomize() {
            let pinks = 0
            tiles.forEach(function (t) {
                let colour = palette[Math.floor(Math.random() * palette.length)]
                t.mesh.material.color.setHex(colour)
                t.mesh.material.emissive.setHex(colour)
                if (colour == 0xfa7fb0) {
                    t.color = 'pink'
                }

            })
        }

        function check() {
            let win = false
            tiles.forEach(function (t) {
                let dx = Math.abs(player.position.x - t.x)
                let dz = Math.abs(player.position.z - t.z)
                if (dx < 0.6 && dz < 0.6 && t.color === 'pink') {
                    win = true
                }
            })
            if (win) {
                tiles.forEach(function (t) {
                    if (t.color !== 'pink') {
                        t.mesh.visible = false
                    }

                })
                setTimeout(() => {
                    tiles.forEach(function (t) {
                        t.color = 'gray'
                        t.mesh.visible = true
                        t.mesh.material.color.setHex(0xffffff)
                        t.mesh.material.emissive.setHex(0x111111)
                    })
                    state = 'wait'
                }, 2000);
            }

        }


        function loop() {
            requestAnimationFrame(loop);
            if (state === 'wait') {
                timer++


                if (timer > 100) {
                    state = 'play'
                    timer = 0
                    randomize()
                }
            }

            if (state === 'play') {
                timer++

                if (timer > 300) {
                    check()
                    timer = 0
                }
            }

            updateCamera();
            updatePlayer();

            renderer.render(scene, camera);
        }

        loop();

        addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>

</html>
